  <!-- OneaMarketing unified analytics layer -->
  <script>
    (function(){
      const referrals = ['onea.co.za','weareit.co.za'];
      const supportedEvents = [
        'service_pillar_view',
        'lead_intent_initiated',
        'form_step_navigation',
        'referral_detected',
        'whatsapp_click',
        'newsletter_submitted',
        'client_portal_view',
        'support_intent_selected',
        'support_submitted',
        'package_selected',
        'application_started',
        'application_completed',
        'signature_request_started',
        'signature_request_sent',
        'signature_request_viewed',
        'generate_lead'
      ];
      window.dataLayer = window.dataLayer || [];

      function parseReferral() {
        try {
          const params = new URLSearchParams(location.search);
          const ref = params.get('ref') || params.get('utm_source') || params.get('utm_medium') || '';
          const docRef = document.referrer || '';
          return { refParam: ref, docRef };
        } catch (e) { return { refParam: '', docRef: document.referrer || '' }; }
      }

      function normalizePayload(payload) {
        const r = parseReferral();
        const matched = referrals.find(domain => (r.refParam && r.refParam.includes(domain)) || (r.docRef && r.docRef.includes(domain))) || null;
        return Object.assign({
          page_path: location.pathname,
          page_url: location.href,
          referral_param: r.refParam,
          document_referrer: r.docRef,
          attribution_domain: matched
        }, payload || {});
      }

      window.OneaMarketing = window.OneaMarketing || {
        _queue: [],
        _initialized: false,
        supported: supportedEvents,
        init: function(){
          this._initialized = true;
          window.dataLayer.push({ event: 'onea_marketing_initialized', supported_events: supportedEvents, page_path: location.pathname });
          console.info('OneaMarketing initialized');
        },
        track: function(event, payload){
          try {
            const normalized = normalizePayload(payload);
            const entry = { event, payload: normalized, ts: Date.now() };
            this._queue.push(entry);
            window.dataLayer.push(Object.assign({ event: event, onea_event: event }, normalized));
            // lightweight console logging for dev/validation - replace with network call if needed
            console.info('[OneaMarketing] track', entry);
            return entry;
          } catch (e) { return null; }
        },
        getAttribution: function(){
          const r = parseReferral();
          const matched = referrals.find(domain => (r.refParam && r.refParam.includes(domain)) || (r.docRef && r.docRef.includes(domain)));
          return { referralParam: r.refParam, documentReferrer: r.docRef, matchedDomain: matched || null };
        },
        listen: function(eventName, handler){
          document.addEventListener('OneaMarketing:'+eventName, function(e){ handler(e.detail); });
        }
      };

      // auto-detect referral on load and log for attribution models
      try {
        const attrib = window.OneaMarketing.getAttribution();
        if (attrib.matchedDomain) {
          window.OneaMarketing.track('referral_detected', { matchedDomain: attrib.matchedDomain, referralParam: attrib.referralParam, documentReferrer: attrib.documentReferrer });
        }
      } catch (e) { /* noop */ }

      // helper to dispatch named OneaMarketing events
      window.dispatchOneaMarketingEvent = function(name, detail){
        try {
          const ev = new CustomEvent('OneaMarketing:'+name, { detail });
          document.dispatchEvent(ev);
        } catch (e) { /* noop */ }
      };

      // expose supported event names for clarity
      window.OneaMarketing.supported = supportedEvents;
      window.OneaMarketing.init();
    })();
  </script>
